# C++ 智能静态分析工具配置文件

# ── 核心扫描配置 ──────────────────────────────────────────────────────────
scan:
  # 要忽略的目录（不扫描第三方库/编译产物）
  exclude_dirs:
    - "build"
    - "vendor"
    - "out"
    - ".git"
    - "__pycache__"
    - "node_modules"
  # 要扫描的文件后缀
  extensions:
    - ".cpp"
    - ".cc"
    - ".cxx"
    - ".h"
    - ".hpp"
    - ".hh"
    - ".hxx"

# ── AI 引擎配置 ────────────────────────────────────────────────────────────
ai:
  # 模型名称
  model: "deepseek-v4-pro"
  # API 端点
  base_url: "https://api.deepseek.com"
  # 请求超时（秒）
  timeout: 30
  # 最大并发调用数
  max_workers: 3

# ── 规则配置 ────────────────────────────────────────────────────────────────
rules:
  # 开启跨文件跨函数配对分析（构造函数/析构函数间的成员变量追踪）
  enable_cross_file_pairing: true
